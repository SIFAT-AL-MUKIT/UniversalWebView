<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .emoji { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:active { background: rgba(255,255,255,0.3); transform: scale(0.98); }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>WebView Template</h1>
        <p>এই HTML ফাইল বদলে তোমার App তৈরি করো!</p>

        <button class="btn" onclick="testDownload()">📥 Test Download</button>
        <button class="btn" onclick="testPrint()">🖨️ Test Print</button>
        <button class="btn" onclick="testAlert()">💬 Test Alert</button>
        <button class="btn" onclick="showInfo()">ℹ️ Device Info</button>

        <div id="output"></div>
    </div>

    <script>
        function log(msg) {
            var o = document.getElementById('output');
            o.style.display = 'block';
            o.textContent += msg + '\n';
        }

        function testDownload() {
            log('Creating test file...');
            var canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 300;
            var ctx = canvas.getContext('2d');
            var g = ctx.createLinearGradient(0,0,400,300);
            g.addColorStop(0,'#667eea'); g.addColorStop(1,'#764ba2');
            ctx.fillStyle = g; ctx.fillRect(0,0,400,300);
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center'; ctx.fillText('Download Test OK!', 200, 150);
            ctx.font = '14px Arial';
            ctx.fillText(new Date().toLocaleString(), 200, 180);
            var link = document.createElement('a');
            link.download = 'test_image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            log('✅ Download triggered!');
        }

        function testPrint() {
            log('Opening print dialog...');
            window.print();
        }

        function testAlert() {
            if (confirm('এটা একটি Confirm Dialog!\n\nOK চাপবে?')) {
                alert('তুমি OK চেপেছো! ✅');
                log('✅ Alert test passed!');
            } else {
                log('❌ Cancelled');
            }
        }

        function showInfo() {
            log('User Agent: ' + navigator.userAgent.substring(0, 80) + '...');
            log('Screen: ' + screen.width + 'x' + screen.height);
            log('Online: ' + navigator.onLine);
            log('Language: ' + navigator.language);
        }
    </script>
</body>
</html>
